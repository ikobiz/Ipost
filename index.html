<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Social Feed</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: auto; padding: 20px; }
    input, button { margin: 5px 0; padding: 8px; width: 100%; }
    form { margin-bottom: 20px; }
    #feed { border-top: 1px solid #ccc; padding-top: 10px; }
    .post { border-bottom: 1px solid #eee; padding: 10px 0; }
    .post-user { font-weight: bold; }
    .post-time { font-size: 0.8em; color: #666; }
  </style>
</head>
<body>
  <h1>Welcome to the Social Feed</h1>

  <!-- Sign-Up Form -->
  <h2>Sign Up</h2>
  <form id="signup-form">
    <input type="text" id="signup-username" placeholder="Username" required />
    <input type="password" id="signup-password" placeholder="Password" required />
    <button type="submit">Sign Up</button>
  </form>
  <p id="signup-message"></p>

  <!-- Login Form -->
  <h2>Login</h2>
  <form id="login-form">
    <input type="text" id="login-username" placeholder="Username" required />
    <input type="password" id="login-password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
  <p id="login-message"></p>

  <!-- Post Form -->
  <h2>Post Something</h2>
  <form id="post-form" style="display: none;">
    <textarea id="post-content" placeholder="What's on your mind?" required></textarea>
    <button type="submit">Post</button>
  </form>

  <!-- Feed -->
  <h2>Feed</h2>
  <div id="feed"></div>

  <script>
    let loggedInUsername = null;

    // Sign-Up Handler
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('signup-username').value;
      const password = document.getElementById('signup-password').value;

      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const text = await res.text();
      document.getElementById('signup-message').textContent = text;

      if (res.ok) {
        loggedInUsername = username;
        document.getElementById('post-form').style.display = 'block';
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('signup-form').style.display = 'none';
        loadPosts();
      }
    });

    // Login Handler
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;

      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const text = await res.text();
      document.getElementById('login-message').textContent = text;

      if (res.ok) {
        loggedInUsername = username;
        document.getElementById('post-form').style.display = 'block';
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('signup-form').style.display = 'none';
        loadPosts();
      }
    });

    // Post Handler
    document.getElementById('post-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const content = document.getElementById('post-content').value;

      const res = await fetch('/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: loggedInUsername, content })
      });

      if (res.ok) {
        document.getElementById('post-content').value = '';
        loadPosts();
      }
    });

    // Load Feed
    async function loadPosts() {
      const res = await fetch('/posts');
      const posts = await res.json();
      const feed = document.getElementById('feed');
      feed.innerHTML = '';

      posts.reverse().forEach(post => {
        const div = document.createElement('div');
        div.className = 'post';
        div.innerHTML = `
          <div class="post-user">${post.user}</div>
          <div class="post-time">${new Date(post.timestamp).toLocaleString()}</div>
          <div class="post-content">${post.content}</div>
        `;
        feed.appendChild(div);
      });
    }
  </script>
</body>
</html>
