<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ipost</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Ipost</h1>

  <!-- Auth Section -->
  <div id="auth-section" class="login-box">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="login-username" placeholder="Username" required />
      <input type="password" id="login-password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p id="login-message"></p>

    <h2>Sign Up</h2>
    <form id="signupForm">
      <input type="text" id="signup-username" placeholder="New Username" required />
      <input type="password" id="signup-password" placeholder="New Password" required />
      <button type="submit">Sign Up</button>
    </form>
    <p id="signup-message"></p>
  </div>

  <!-- Feed Section -->
  <div id="feed-section" style="display: none;" class="login-box">
    <h2>Welcome, <span id="username-display"></span>!</h2>
    <div class="user-menu">
  <button id="user-button">⚙️ Account ▾</button>
  <div id="user-dropdown" class="dropdown hidden">
    <button id="logout-button">Logout</button>
    <button id="toggle-password">Change Password</button>
  </div>
</div>

<div id="password-form" class="login-box hidden">
  <h3>Change Password</h3>
  <form id="changePasswordForm">
    <input type="password" id="current-password" placeholder="Current Password" required />
    <input type="password" id="new-password" placeholder="New Password" required />
    <button type="submit">Change Password</button>
  </form>
  <p id="change-password-message"></p>
</div>


    <h2>Post Something</h2>
    <form id="postForm">
      <input type="text" id="post-content" placeholder="What's on your mind?" required />
      <button type="submit">Post</button>
    </form>
    <p id="post-message"></p>

    <h2>Recent Posts</h2>
    <div id="feed"></div>

  <script>
    let loggedInUsername = null;

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;

      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const text = await res.text();
      document.getElementById('login-message').textContent = text;

      if (res.ok) {
        loggedInUsername = username;
        showFeed();
      }
    });

    // Sign Up
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('signup-username').value;
      const password = document.getElementById('signup-password').value;

      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const text = await res.text();
      document.getElementById('signup-message').textContent = text;

      if (res.ok) {
        loggedInUsername = username;
        showFeed();
      }
    });

    // Post
    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const content = document.getElementById('post-content').value;

      const res = await fetch('/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: loggedInUsername, content })
      });

      const text = await res.text();
      document.getElementById('post-message').textContent = text;

      if (res.ok) {
        document.getElementById('post-content').value = '';
        loadFeed();
      }
    });

    // Change Password
    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const currentPassword = document.getElementById('current-password').value;
      const newPassword = document.getElementById('new-password').value;

      const res = await fetch('/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: loggedInUsername,
          currentPassword,
          newPassword
        })
      });

      const text = await res.text();
      document.getElementById('change-password-message').textContent = text;

      if (res.ok) {
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
      }
    });

    // Logout
    document.getElementById('logout-button').addEventListener('click', () => {
      loggedInUsername = null;
      document.getElementById('auth-section').style.display = 'block';
      document.getElementById('feed-section').style.display = 'none';
      document.getElementById('feed').innerHTML = '';
    });

    // Load Feed
    async function loadFeed() {
      const res = await fetch('/posts');
      const posts = await res.json();
      const feed = document.getElementById('feed');
      feed.innerHTML = '';

      posts.reverse().forEach(post => {
        const div = document.createElement('div');
        div.className = 'post';
        div.innerHTML = `
          <strong>${post.user}</strong>: ${post.content}
          <div class="timestamp">${new Date(post.timestamp).toLocaleString()}</div>
        `;
        feed.appendChild(div);
      });
    }

    // Show Feed
    function showFeed() {
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('feed-section').style.display = 'block';
      document.getElementById('username-display').textContent = loggedInUsername;
      loadFeed();
    }

    document.getElementById('user-button').addEventListener('click', () => {
  document.getElementById('user-dropdown').classList.toggle('hidden');
});

document.getElementById('toggle-password').addEventListener('click', () => {
  document.getElementById('password-form').classList.toggle('hidden');
  document.getElementById('user-dropdown').classList.add('hidden');
});

  </script>
</body>
</html>
